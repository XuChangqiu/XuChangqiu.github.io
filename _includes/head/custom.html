<style>

  html[data-lang="zh"] .lang-en,
  html:not([data-lang]) .lang-zh {
    display: none !important;
  }

  .site-language-toggle {
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #374151;
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 0.82rem;
    font-weight: 800;
    line-height: 1.2;
    cursor: pointer;
  }

  body {
    margin: 0;
    color: #374151;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }

  .masthead {
    position: sticky;
    top: 0;
    z-index: 20;
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
  }

  .masthead__inner-wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0.55rem 0.85rem;
  }

  .masthead__menu {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .greedy-nav {
    flex: 1 1 auto;
    min-width: 0;
  }

  .greedy-nav > button,
  .hidden-links {
    display: none;
  }

  .visible-links {
    display: flex;
    align-items: center;
    gap: 1.4rem;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .masthead__menu-item {
    list-style: none;
    white-space: nowrap;
  }

  .masthead__menu-item a {
    color: #4b5563;
    text-decoration: none;
    font-weight: 500;
  }

  .masthead__menu-item--lg a {
    font-weight: 800;
  }

  #main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem 0.85rem;
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    gap: 2rem;
  }

  .sidebar {
    min-width: 0;
  }

  .sidebar.sticky {
    position: sticky;
    top: 5.5rem;
    align-self: start;
  }

  .profile_box {
    display: block;
  }

  .author__avatar img,
  img.author__avatar {
    display: block;
    width: 175px;
    height: 175px;
    max-width: 100%;
    object-fit: cover;
    object-position: center 35%;
    border-radius: 50%;
    border: 1px solid #e5e7eb;
    padding: 5px;
    background: #ffffff;
  }

  .author__name {
    margin: 1rem 0 0.35rem;
    color: #374151;
    font-size: 1.2rem;
  }

  .author__bio {
    line-height: 1.55;
    margin: 0 0 1rem;
  }

  .author__urls {
    margin: 1rem 0 0;
    padding: 0;
    list-style: none;
  }

  .author__urls li {
    margin: 0.45rem 0;
    line-height: 1.45;
  }

  .author__urls a {
    color: #4b5563;
    text-decoration: none;
  }

  .page {
    min-width: 0;
  }

  .page__content img {
    max-width: 100%;
    height: auto;
  }

  @media (max-width: 900px) {
    #main {
      display: block;
      padding-top: 1.25rem;
    }

    .sidebar.sticky {
      position: static;
      margin-bottom: 1.5rem;
    }

    .profile_box {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .author__avatar img,
    img.author__avatar {
      width: 84px;
      height: 84px;
    }

    .visible-links {
      gap: 0.85rem;
      overflow-x: auto;
    }
  }
